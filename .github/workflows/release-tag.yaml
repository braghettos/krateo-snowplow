name: release-tag

on:
  push:
    # Match both ship tags (e.g. 0.30.246) AND diagnostic pre-release
    # tags (e.g. 0.30.247-pre1, 0.30.247-pre2). The -pre suffix marks
    # diagnostic-only artifact-capture builds — same image-build path,
    # same OCI publishing, but NOT a customer-facing release. See
    # 0.30.247-pre1 (addfunc.entry Detailed-funcs instrumentation,
    # task #194 HARD gate #1) for the introducing precedent.
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-pre[0-9]+'

env:
  GHCR_REPO: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build and Push (linux/amd64)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REPO }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.GHCR_REPO }}:${{ steps.meta.outputs.version }}
