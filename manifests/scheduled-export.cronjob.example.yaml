# Scheduled-export hook — GENERIC example (howto/export.md).
#
# A recurring export is deliberately just a CronJob calling snowplow's
# GET /export with its own credentials: the export is resolved through
# the same RBAC-gated /call lane as an interactive request, and each run
# emits an AuditEvent. This example uploads the produced CSV to any
# S3-compatible object storage; swap the upload step for whatever sink
# your deployment uses.
#
# Placeholders to adapt:
#   - schedule, resource/name/namespace/fields query parameters
#   - export-credentials Secret: TOKEN (snowplow JWT), S3 endpoint/keys
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduled-export-example
  namespace: krateo-system
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          # Least-privilege pod defaults — a shipped example gets copy-pasted,
          # so it should be exemplary. runAsNonRoot + RuntimeDefault seccomp.
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: export
              # Pin a specific tag (never :latest) so the run is reproducible and
              # a trusted, scanned image is used. Bump deliberately.
              image: quay.io/curl/curl:8.11.1
              # Bounded resources — a scheduled job should never be able to
              # starve the node (Trivy/KSV: requests + limits set).
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              command: ["/bin/sh", "-ec"]
              args:
                - |
                  STAMP="$(date -u +%Y%m%d-%H%M%S)"
                  FILE="/tmp/export-${STAMP}.csv"
                  curl -fsS \
                    -H "Authorization: Bearer ${TOKEN}" \
                    "${SNOWPLOW_URL}/export?apiVersion=${API_VERSION}&resource=${RESOURCE}&name=${NAME}&namespace=${NAMESPACE}&format=csv" \
                    -o "${FILE}"
                  # Upload to any S3-compatible bucket (AWS SigV4 via curl).
                  curl -fsS --aws-sigv4 "aws:amz:${S3_REGION}:s3" \
                    --user "${S3_ACCESS_KEY}:${S3_SECRET_KEY}" \
                    -T "${FILE}" \
                    "${S3_ENDPOINT}/${S3_BUCKET}/exports/export-${STAMP}.csv"
              # Container-level hardening (Trivy/KSV: drop ALL caps, no privilege
              # escalation, read-only root FS). The curl step writes only to
              # /tmp, mounted as a writable emptyDir below.
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              env:
                - name: SNOWPLOW_URL
                  value: "http://snowplow.krateo-system.svc.cluster.local:8081"
                - name: API_VERSION
                  value: "templates.krateo.io/v1"
                - name: RESOURCE
                  value: "restactions"
                - name: NAME
                  value: "my-list"
                - name: NAMESPACE
                  value: "demo"
                - name: S3_REGION
                  value: "eu-central-1"
              envFrom:
                - secretRef:
                    # TOKEN, S3_ENDPOINT, S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY
                    name: export-credentials
          # Writable scratch for the curl download — the container root FS is
          # read-only (securityContext above), so /tmp is a dedicated emptyDir.
          volumes:
            - name: tmp
              emptyDir: {}
